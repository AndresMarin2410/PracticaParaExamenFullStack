spring:
  application:
    name: MicroService-Orden


  datasource:
    url: jdbc:mysql://localhost:3306/db_orden
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /orden/swagger-ui.html
  use-management-port: false

server:
  port: 8082
